<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Printing Shop Event</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main">
    <header class="hero">
      <h1>3D Printing Workshop</h1>
      <p>Join us for an exciting workshop on 3D printing technology and design</p>
    </header>

    <section class="card">
      
      <img src="banner.jpg" alt="Event Banner">
    </section>

    <section class="card">
      <h2>Promotional Video</h2>
      <video controls>
        <source src="3D.mp4" type="video/mp4">
      </video>
    </section>

    <section class="card">
      <h2>Event Intro Audio</h2>
      <audio controls>
        <source src="intro.mp3" type="audio/mpeg">
      </audio>
    </section>

    <section class="card">
      <h2>Event Registration Form</h2>
      <form>
        <label>Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Date</label>
        <input type="date" required>

        <label>Session</label>
        <div class="radio-group">
          <label><input type="radio" name="session" required> Morning</label>
          <label><input type="radio" name="session"> Afternoon</label>
          <label><input type="radio" name="session"> Evening</label>
        </div>

        <label>Material</label>
        <select required>
          <option value="">--Select--</option>
          <option>PLA</option>
          <option>ABS</option>
          <option>Resin</option>
        </select>

        <label>Comments</label>
        <textarea rows="4"></textarea>

        <label>Upload Design</label>
        <input type="file">

        <button type="submit">Register</button>
      </form>
    </section>
  </div>
</body>
</html>
